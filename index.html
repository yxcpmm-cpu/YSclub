<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞下单</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#000,#0a0a0a);
    color:#fff;
    font-family:Arial;
}

.header img{
    width:100%;
    filter:brightness(0.8);
}

.menu{
    display:flex;
    justify-content:space-around;
    padding:12px;
    font-size:18px;
    background:#0d0d0d;
    border-bottom:1px solid #222;
}

.title{
    color:#FFD700;
    font-size:28px;
    margin:20px;
    font-weight:bold;
}

.card{
    background:linear-gradient(145deg,#111,#1c1c1c);
    margin:15px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.price{
    color:#FFD700;
    font-size:22px;
}

.btn{
    background:linear-gradient(90deg,#FFD700,#ffcc00);
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:12px;
    margin-top:12px;
    cursor:pointer;
    font-weight:bold;
}

.form{
    display:none;
    background:#111;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#0d0d0d;
    color:#fff;
}

/* 🔥 数量按钮 */
.qty-box{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:10px 0;
}
.qty-btn{
    background:#FFD700;
    color:#000;
    padding:5px 12px;
    border-radius:6px;
    cursor:pointer;
}
.qty{
    margin:0 10px;
    font-size:18px;
}

/* 🔥 付款弹窗 */
.payBox{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}
.payContent{
    background:#111;
    padding:20px;
    border-radius:15px;
    text-align:center;
}
.payContent img{
    width:200px;
    margin:10px 0;
}

.submit{
    background:#FFD700;
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<!-- 公告 -->
<div class="notice">
<div class="notice-text">
📢 欢迎来到YS电竞俱乐部｜24小时营业｜下单请填写正确资料🔥
</div>
</div>

<style>
.notice {
    width:100%;
    overflow:hidden;
    background:linear-gradient(90deg,#5f00ff,#9b00ff);
    padding:10px 0;
}
.notice-text{
    white-space:nowrap;
    animation:scroll 10s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}
</style>

<body>

<div class="header">
<img src="https://i.ibb.co/vxNwFB1p/file-000000003c94720ba60156c57682c8a1.png">
</div>

<div class="menu">
<div>YS电竞护航🎮</div>
</div>

<div class="title">百万单</div>

<!-- 300万 -->
<div class="card">
<div>300万</div>
<div class="price">RM3</div>
<div class="btn" onclick="toggleForm('f300')">下单</div>

<div class="form" id="f300">
<input placeholder="游戏ID">
<input placeholder="你的名字">
<input placeholder="联系方式">

<div class="qty-box">
<div class="qty-btn" onclick="changeQty(this,-1)">-</div>
<div class="qty">1</div>
<div class="qty-btn" onclick="changeQty(this,1)">+</div>
</div>

<div class="submit" onclick="submitOrder('300万',3,this)">提交订单</div>
</div>
</div>

<!-- 👉 其他全部你原本的我没动（照旧） -->

<!-- 🔥 付款弹窗 -->
<div class="payBox" id="payBox">
<div class="payContent">
<h3>请扫码付款</h3>

<!-- 🔥 这里换你的二维码 -->
<img src="https://i.ibb.co/1G6hLDQR/IMG-20260320-111720.jpg">

<div id="payText"></div>

<div class="submit" onclick="confirmPay()">我已付款</div>
</div>
</div>

<script>
function toggleForm(id){
    let f = document.getElementById(id);
    f.style.display = f.style.display === "block" ? "none" : "block";
}

function changeQty(btn, num){
    let qty = btn.parentElement.querySelector(".qty");
    let val = parseInt(qty.innerText);
    val += num;
    if(val<1) val=1;
    qty.innerText = val;
}

let orderData = "";

function submitOrder(product, price, btn){
    let form = btn.parentElement;
    let inputs = form.getElementsByTagName("input");

    let id = inputs[0].value;
    let name = inputs[1].value;
    let contact = inputs[2].value;
    let qty = form.querySelector(".qty").innerText;

    if(!id || !name || !contact){
        alert("请填写完整资料！");
        return;
    }

    let total = price * qty;

    orderData = `订单:%0A商品:${product}%0A数量:${qty}%0A总价:RM${total}%0AID:${id}%0A名字:${name}%0A联系方式:${contact}`;

    document.getElementById("payText").innerHTML = "应付金额 RM" + total;
    document.getElementById("payBox").style.display="flex";
}

function confirmPay(){
    window.open("https://wa.me/601165268227?text=" + orderData);
}
</script>

</body>
</html>
