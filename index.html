<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞</title>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:sans-serif}

/* 轮播 */
.banner{height:180px;overflow:hidden;position:relative}
.banner img{width:100%;height:180px;object-fit:cover;position:absolute}

/* 分类 */
.menu{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;margin:10px}

/* 分组 */
.group{padding:10px}
.group h2{color:#FFD700}

/* 卡片 */
.container{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:#1a1a1a;padding:10px;border-radius:10px}
.price{color:#FFD700}

button{width:100%;margin-top:5px;padding:8px;border:none;border-radius:6px;background:#FFD700;color:#000}
</style>
</head>

<body>

<div class="banner">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
</div>

<div class="menu">
<div>🎮<br>护航</div>
</div>

<div id="shop"></div>

<script>
let data = JSON.parse(localStorage.getItem("shopData")) || {
    "百万单":[
        {name:"300万",price:"RM3"},
        {name:"600万",price:"RM6"}
    ],
};

function render(){
    let html="";
    for(let group in data){
        html+=`<div class="group"><h2>${group}</h2><div class="container">`;
        data[group].forEach(item=>{
            html+=`
            <div class="card">
                ${item.name}
                <div class="price">${item.price}</div>
                <button onclick="buy('${item.name} ${item.price}')">下单</button>
            </div>`;
        });
        html+="</div></div>";
    }
    document.getElementById("shop").innerHTML=html;
}

function buy(text){
    let uid=prompt("输入ID:");
    if(uid){
        window.location.href=`https://wa.me/60105997283?text=下单 ${text} ID:${uid}`;
    }
}

render();
</script>

</body>
</html>
