<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞下单</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

.header img{
    width:100%;
}

.menu{
    display:flex;
    justify-content:space-around;
    padding:10px;
    font-size:18px;
}

.title{
    color:#FFD700;
    font-size:26px;
    margin:20px;
}

.card{
    background:#1a1a1a;
    margin:15px;
    padding:20px;
    border-radius:15px;
}

.price{
    color:#FFD700;
    font-size:20px;
}

.btn{
    background:#FFD700;
    color:#000;
    padding:10px;
    text-align:center;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

.form{
    display:none;
    background:#111;
    margin:15px;
    padding:20px;
    border-radius:15px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

.submit{
    background:#FFD700;
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
</div>

<div class="menu">
<div>🎮 护航</div>
<div>⚔ 装备</div>
<div>💎 百万</div>
<div>🔥 千万</div>
</div>

<div class="title">百万单</div>

<div class="card">
<div>300万</div>
<div class="price">RM3</div>
<div class="btn" onclick="showForm('300万 RM3')">下单</div>
</div>

<div class="card">
<div>600万</div>
<div class="price">RM6</div>
<div class="btn" onclick="showForm('600万 RM6')">下单</div>
</div>

<div class="title">千万单</div>

<div class="card">
<div>1000万</div>
<div class="price">RM10</div>
<div class="btn" onclick="showForm('1000万 RM10')">下单</div>
</div>

<!-- 下单填写 -->
<div class="form" id="orderForm">
<h3>填写资料</h3>

<input type="text" id="gameId" placeholder="游戏ID">
<input type="text" id="name" placeholder="你的名字">
<input type="text" id="contact" placeholder="联系方式">

<div class="submit" onclick="submitOrder()">提交订单</div>
</div>

<script>
let selectedProduct = "";

function showForm(product){
    selectedProduct = product;
    document.getElementById("orderForm").style.display = "block";
    window.scrollTo(0,document.body.scrollHeight);
}

function submitOrder(){
    let id = document.getElementById("gameId").value;
    let name = document.getElementById("name").value;
    let contact = document.getElementById("contact").value;

    let msg = `订单:%0A商品:${selectedProduct}%0AID:${id}%0A名字:${name}%0A联系方式:${contact}`;

    window.open("https://wa.me/601165268227?text=" + msg);
}
</script>

</body>
</html>
