<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YS CLUB</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:sans-serif;
}

/* 顶部 */
.header{
    background:linear-gradient(to right,#89c2ff,#bde0fe);
    padding:20px;
    text-align:center;
    font-size:20px;
}

/* 分类按钮 */
.tabs{
    display:flex;
    justify-content:space-around;
    margin:15px;
}
.tab{
    background:white;
    padding:10px;
    border-radius:10px;
}

/* 商品区 */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-around;
}

.card{
    width:45%;
    background:white;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
}

.card p{
    padding:5px;
}

.price{
    color:red;
    font-weight:bold;
}

.btn{
    display:block;
    background:gold;
    text-align:center;
    padding:10px;
    text-decoration:none;
    color:black;
}
</style>

</head>

<body>

<div class="header">YS CLUB 首页</div>

<div class="tabs">
    <div class="tab">地铁护航区</div>
    <div class="tab">吃丹修仙</div>
    <div class="tab">装备区</div>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <p>冰河禁区 600万-1000万</p>
        <p class="price">￥39.80</p>
        <a href="order.html" class="btn">立即下单</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <p>荣都 666万-1500万</p>
        <p class="price">￥48.80</p>
        <a href="order.html" class="btn">立即下单</a>
    </div>

</div>

</body>
</html>
