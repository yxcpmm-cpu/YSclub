<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YS电竞下单</title>

<style>
body{
    background:#2b0d4d;
    font-family:sans-serif;
    color:#fff;
    padding:10px;
}

/* 表单卡片 */
.form-box{
    background:linear-gradient(180deg,#6a00ff,#3b0070);
    padding:15px;
    border-radius:15px;
}

/* 输入框 */
.input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:10px;
}

/* 性别 */
.gender{
    margin:10px 0;
}

/* 数量 */
.qty{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:10px 0;
}

/* 付款 */
.pay{
    background:#fff;
    color:#000;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* 底部 */
.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
}

.total{
    color:#ff4d4d;
    font-weight:bold;
}

.btn{
    background:linear-gradient(90deg,#a64dff,#ff00cc);
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="form-box">

<h3>确认订单</h3>

<input class="input" id="gameId" placeholder="请输入游戏ID">
<input class="input" id="name" placeholder="请输入名字">
<input class="input" id="rank" placeholder="请输入段位">

<div class="gender">
    性别：
    <label><input type="radio" name="sex" value="男">男</label>
    <label><input type="radio" name="sex" value="女">女</label>
</div>

<input class="input" id="note" placeholder="备注">

<!-- 数量 -->
<div class="qty">
    数量：
    <button onclick="changeQty(-1)">-</button>
    <span id="qty">1</span>
    <button onclick="changeQty(1)">+</button>
</div>

<!-- 付款 -->
<div class="pay">
    <label><input type="radio" name="pay" checked> TNG / DuitNow</label><br>
    <label><input type="radio" name="pay"> 联系客服</label>
</div>

<!-- 底部 -->
<div class="bottom">
    <div class="total">总价：RM <span id="total">3</span></div>
    <div class="btn" onclick="submitOrder()">确认下单</div>
</div>

</div>

<script>
let price = 3; // 单价
let qty = 1;

function changeQty(num){
    qty += num;
    if(qty < 1) qty = 1;
    document.getElementById("qty").innerText = qty;
    updateTotal();
}

function updateTotal(){
    document.getElementById("total").innerText = price * qty;
}

function submitOrder(){
    let id = document.getElementById("gameId").value;
    let name = document.getElementById("name").value;
    let rank = document.getElementById("rank").value;

    if(!id || !name){
        alert("请填写完整！");
        return;
    }

    let msg = `🎮YS电竞下单
ID：${id}
名字：${name}
段位：${rank}
数量：${qty}
总价：RM${price * qty}`;

    let phone = "60123456789";
    window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
