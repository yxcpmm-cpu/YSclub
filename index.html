<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞护航</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#5b3ea6;
    color:#fff;
}

/* 顶部banner */
.banner{
    padding:15px;
}
.banner img{
    width:100%;
    border-radius:15px;
}

/* 功能按钮 */
.menu{
    display:flex;
    justify-content:space-around;
    text-align:center;
    margin:15px 0;
}
.menu div{
    font-size:14px;
}
.menu i{
    display:block;
    font-size:24px;
    margin-bottom:5px;
}

/* 公告 */
.notice{
    margin:10px 15px;
    background:#ffffff33;
    padding:10px;
    border-radius:20px;
    text-align:center;
}

/* 标题 */
.title{
    margin:15px;
    font-size:20px;
    font-weight:bold;
}

/* 商品卡片 */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}
.card{
    background:#fff;
    color:#000;
    border-radius:15px;
    overflow:hidden;
}
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}
.card .info{
    padding:10px;
}
.price{
    color:red;
    font-weight:bold;
}
.btn{
    background:#7b5cff;
    color:#fff;
    text-align:center;
    padding:8px;
    border-radius:10px;
    margin-top:8px;
}

/* 底部导航 */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#fff;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    color:#000;
}
.nav div{
    text-align:center;
    font-size:12px;
}
</style>

</head>

<body>

<!-- banner -->
<div class="banner">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
</div>

<!-- 功能菜单 -->
<div class="menu">
    <div><i>🏠</i>平台介绍</div>
    <div><i>🎧</i>联系客服</div>
    <div><i>📋</i>下单必看</div>
    <div><i>⭐</i>招募打手</div>
</div>

<!-- 公告 -->
<div class="notice">
📢 24小时营业中，禁止未成年人下单
</div>

<!-- 标题 -->
<div class="title">🔥 地铁保底专区</div>

<!-- 商品 -->
<div class="grid">

    <div class="card">
        <img src="https://i.imgur.com/QIrZWGIs.jpg">
        <div class="info">
            体验单 保底300W
            <div class="price">RM16.8</div>
            <div class="btn" onclick="order('体验单')">下单</div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.imgur.com/Vz81C7P.jpg">
        <div class="info">
            保底350W 套装
            <div class="price">RM19.9</div>
            <div class="btn" onclick="order('350W套餐')">下单</div>
        </div>
    </div>

</div>

<!-- 底部导航 -->
<div class="nav">
    <div>🏠<br>首页</div>
    <div>📦<br>分类</div>
    <div>💬<br>消息</div>
    <div>👤<br>我的</div>
</div>

<script>
function order(name){
    alert("你选择了：" + name);
}
</script>

</body>
</html>
