<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YS电竞</title>

<style>
body{
    margin:0;
    background:#0c0c0c;
    color:white;
    font-family:sans-serif;
}

/* 顶部 */
.header{
    background:url('https://images.unsplash.com/photo-1520975922203-b0b6c4b6c8c6');
    background-size:cover;
    padding:40px;
    text-align:center;
    font-size:22px;
    color:gold;
    font-weight:bold;
}

/* 分类 */
.tabs{
    display:flex;
    justify-content:space-around;
    margin:15px;
}
.tab{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    color:gold;
}

/* 商品 */
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-around;
}

.card{
    width:45%;
    background:#111;
    border:1px solid gold;
    border-radius:10px;
    margin:10px 0;
    overflow:hidden;
}

.card img{
    width:100%;
}

.card p{
    padding:5px;
}

.price{
    color:#ffcc00;
    font-weight:bold;
}

/* 按钮 */
.btn{
    display:block;
    background:gold;
    text-align:center;
    padding:10px;
    text-decoration:none;
    color:black;
}
</style>

</head>

<body>

<div class="header">YS电竞价格系统</div>

<div class="tabs">
    <div class="tab">百万单</div>
    <div class="tab">千万单</div>
    <div class="tab">特殊单</div>
</div>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <p>300万</p>
        <p class="price">RM3</p>
        <a href="order.html?item=300万 RM3" class="btn">立即下单</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <p>600万</p>
        <p class="price">RM6</p>
        <a href="order.html?item=600万 RM6" class="btn">立即下单</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x150">
        <p>900万</p>
        <p class="price">RM9</p>
        <a href="order.html?item=900万 RM9" class="btn">立即下单</a>
    </div>

</div>

</body>
</html>
