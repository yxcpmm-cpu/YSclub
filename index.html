<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞护航</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#6b4bbd;
    color:#fff;
}

/* banner轮播 */
.banner{
    overflow:hidden;
    margin:10px;
}
.banner img{
    width:100%;
    border-radius:15px;
}

/* 菜单 */
.menu{
    display:flex;
    justify-content:space-around;
    text-align:center;
    margin:15px 0;
}
.menu div{
    font-size:13px;
}
.menu span{
    display:block;
    font-size:22px;
    margin-bottom:5px;
}

/* 公告 */
.notice{
    margin:10px;
    background:#ffffff33;
    padding:10px;
    border-radius:20px;
    text-align:center;
}

/* 标题 */
.title{
    margin:15px;
    font-size:18px;
    font-weight:bold;
}

/* 商品 */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}
.card{
    background:#fff;
    color:#000;
    border-radius:15px;
    overflow:hidden;
}
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}
.card .info{
    padding:10px;
}
.price{
    color:red;
    font-weight:bold;
}
.btn{
    background:#7b5cff;
    color:#fff;
    text-align:center;
    padding:8px;
    border-radius:10px;
    margin-top:8px;
}

/* 弹窗 */
.popup{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:#fff;
    color:#000;
    border-radius:20px 20px 0 0;
    padding:15px;
    transition:0.3s;
}
.popup.active{
    bottom:0;
}
.popup input{
    width:100%;
    margin:5px 0;
    padding:10px;
}
.submit{
    background:#7b5cff;
    color:#fff;
    text-align:center;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* 底部导航 */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#fff;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    color:#000;
}
.nav div{
    text-align:center;
    font-size:12px;
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner">
    <img src="https://i.imgur.com/8Km9tLL.jpg">
</div>

<!-- 菜单 -->
<div class="menu">
    <div><span>🏠</span>平台介绍</div>
    <div><span>🎧</span>联系客服</div>
    <div><span>📋</span>下单必看</div>
    <div><span>⭐</span>招募打手</div>
</div>

<!-- 公告 -->
<div class="notice">
📢 24小时营业中，禁止未成年人下单
</div>

<!-- 标题 -->
<div class="title">🔥 地铁保底专区</div>

<!-- 商品 -->
<div class="grid">

    <div class="card">
        <img src="https://i.imgur.com/QIrZWGIs.jpg">
        <div class="info">
            体验单 保底300W
            <div class="price">RM16.8</div>
            <div class="btn" onclick="openForm('体验单')">下单</div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.imgur.com/Vz81C7P.jpg">
        <div class="info">
            保底350W 套餐
            <div class="price">RM19.9</div>
            <div class="btn" onclick="openForm('350W套餐')">下单</div>
        </div>
    </div>

</div>

<!-- 弹窗 -->
<div class="popup" id="popup">
    <h3 id="title"></h3>
    <input placeholder="游戏ID">
    <input placeholder="你的名字">
    <input placeholder="备注">
    <div class="submit" onclick="submitOrder()">提交订单</div>
</div>

<!-- 底部导航 -->
<div class="nav">
    <div>🏠<br>首页</div>
    <div>📦<br>分类</div>
    <div>💬<br>消息</div>
    <div>👤<br>我的</div>
</div>

<script>
let current = "";

function openForm(name){
    current = name;
    document.getElementById("title").innerText = name;
    document.getElementById("popup").classList.add("active");
}

function submitOrder(){
    alert("已提交：" + current);
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
