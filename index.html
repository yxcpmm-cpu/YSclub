<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞下单</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#000,#0a0a0a);
    color:#fff;
    font-family:Arial;
}

/* 顶部图 */
.header img{
    width:100%;
    filter:brightness(0.8);
}

/* 菜单 */
.menu{
    display:flex;
    justify-content:space-around;
    padding:12px;
    font-size:18px;
    background:#0d0d0d;
    border-bottom:1px solid #222;
}

/* 标题 */
.title{
    color:#FFD700;
    font-size:28px;
    margin:20px;
    font-weight:bold;
}

/* 卡片 */
.card{
    background:linear-gradient(145deg,#111,#1c1c1c);
    margin:15px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(255,215,0,0.3);
}

/* 价格 */
.price{
    color:#FFD700;
    font-size:22px;
    margin-top:5px;
}

/* 按钮 */
.btn{
    background:linear-gradient(90deg,#FFD700,#ffcc00);
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:12px;
    margin-top:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

.btn:active{
    transform:scale(0.95);
}

/* 表单 */
.form{
    display:none;
    background:linear-gradient(145deg,#111,#1a1a1a);
    margin:15px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 15px rgba(255,215,0,0.15);
}

/* 输入框 */
input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    background:#0d0d0d;
    color:#fff;
    outline:none;
    font-size:15px;
    box-shadow:inset 0 0 5px rgba(255,255,255,0.1);
}

input:focus{
    box-shadow:0 0 8px rgba(255,215,0,0.6);
}

/* 提交按钮 */
.submit{
    background:linear-gradient(90deg,#FFD700,#ffcc00);
    color:#000;
    padding:14px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
    transition:0.2s;
}

.submit:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.ibb.co/vxNwFB1p/file-000000003c94720ba60156c57682c8a1.png">
</div>

<div class="menu">
<div>YS电竞护航🎮 </div>
</div>

<div class="title">百万单</div>

<div class="card">
    <div style="font-size:20px;font-weight:bold;">300万</div>
    <div class="price">RM3</div>
    <div class="btn" onclick="selectOrder('300万','RM3'); showForm()">下单</div>
</div>

<div class="btn" onclick="selectOrder('600万','RM6'); showForm(600万)">下单</div>

<div class="btn" onclick="selectOrder('900万','RM9'); showForm(900万)">下单</div>

<div class="title">千万单</div>

<div class="btn" onclick="selectOrder('1000万','RM10'); showForm(1000万)">下单</div>

<div class="btn" onclick="selectOrder('2000万','RM28'); showForm(2000万)">下单</div>

<div class="btn" onclick="selectOrder('4000万','RM35'); showForm(4000万)">下单</div>

<div class="btn" onclick="selectOrder('6000万','RM50'); showForm(6000万)">下单</div>

<div class="btn" onclick="selectOrder('8000万','RM70'); showForm(8000万)">下单</div>

<div class="title">赌狗单（无累计无上限）</div>

<div class="card">
<div>金条2根</div>
<div class="price">RM11.88</div>
<div class="btn" onclick="selectOrder('金条2根 RM11.88')；showForm('金条2根')">下单</div>
</div>

<div class="card">
<div>金条4根</div>
<div class="price">RM18.88</div>
<div class="btn" onclick="selectOrder('金条4根 RM18.88')；showForm('2金条4根')">下单</div>
</div>

<div class="card">
<div>金条6根</div>
<div class="price">RM28.88</div>
<div class="btn" onclick="selectOrder('金条6根 RM28.88')；showForm('金条6根')">下单</div>
</div>

<div class="title">苏尔南冲突[实验基地]</div>

<div class="card">
<div>1000万</div>
<div class="price">RM14.88</div>
<div class="btn"onclick="selectOrder('1000万 RM14.88')；showForm('1000万')">下单</div>
</div>

<!-- 表单 -->
<div class="form" id="orderForm" style="display:none;">

<h3>填写资料</h3>

<input type="text" id="gameId" placeholder="游戏ID"><br><br>
<input type="text" id="name" placeholder="你的名字"><br><br>
<input type="text" id="contact" placeholder="联系方式"><br><br>

<div class="submit" onclick="submitOrder()">提交订单</div>

</div>

<!-- 假订单 -->
<div id="fakeOrders" style="
position:fixed;
bottom:20px;
left:20px;
background:#111;
padding:10px 15px;
border-radius:10px;
box-shadow:0 0 10px rgba(255,215,0,0.3);
font-size:14px;
display:none;
">
有人刚刚下单🔥
</div>

<!-- 加载 -->
<div id="loading" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
color:#FFD700;
font-size:20px;
z-index:999;
">
下单中...
</div>

<!-- 成功 -->
<div id="success" style="
display:none;
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,0,0.5);
color:#0f0;
font-size:18px;
z-index:1000;
">
下单成功 ✅
</div>

<script>
let selectedProduct = "";
let currentPrice = "";

function selectOrder(order, price){
    selectedProduct = order;
    currentPrice = price;

function showForm(){
    document.getElementById("orderForm").style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

function submitOrder(){
    let id = document.getElementById("gameId").value;
    let name = document.getElementById("name").value;
    let contact = document.getElementById("contact").value;

    if(!id || !name || !contact){
        alert("请填写完整资料！");
        return;
    }

    document.getElementById("loading").style.display = "flex";

    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
        document.getElementById("success").style.display = "block";

        setTimeout(()=>{
            document.getElementById("success").style.display = "none";

            let msg = `订单:%0A商品:${selectedProduct}%0AID:${id}%0A名字:${name}%0A联系方式:${contact}`;

            window.open("https://wa.me/601165268227?text=" + msg);

        },1500);

    },1500);
}

// 假订单滚动
setInterval(()=>{
    let box = document.getElementById("fakeOrders");
    box.style.display = "block";

    let list = ["玩家A","玩家B","玩家C","玩家D"];
    let random = list[Math.floor(Math.random()*list.length)];

    box.innerText = random + " 刚刚下单成功🔥";

    setTimeout(()=>{
        box.style.display = "none";
    },3000);

},5000);
</script>

</body>
</html>
