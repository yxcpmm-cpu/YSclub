<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YS电竞下单</title>

<style>
body{
    background:#2b0d4d;
    font-family:sans-serif;
    color:#fff;
    margin:0;
    padding:15px;
    font-size:18px;
}

.title{
    font-size:26px;
    margin:20px 0;
    font-weight:bold;
}

.card{
    background:#3b0070;
    padding:20px;
    border-radius:20px;
    margin-bottom:15px;
    font-size:20px;
}

.price{
    color:#FFD700;
    margin:10px 0;
    font-size:22px;
    font-weight:bold;
}

.btn{
    background:#FFD700;
    color:#000;
    padding:14px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

#orderForm{
    display:none;
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#2b0d4d;
    padding:20px;
    border-top-left-radius:25px;
    border-top-right-radius:25px;
    z-index:999;
}

.form-box{
    background:linear-gradient(180deg,#6a00ff,#3b0070);
    padding:20px;
    border-radius:20px;
}

.input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:18px;
}

.bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:20px;
}

.total{
    color:#ff4d4d;
    font-weight:bold;
    font-size:22px;
}
</style>
</head>

<body>

<div class="title">YS电竞护航🎮</div>

<div class="card">
    <div>300万</div>
    <div class="price">RM3</div>
    <div class="btn" onclick="showForm('300万',3)">下单</div>
</div>

<div class="card">
    <div>600万</div>
    <div class="price">RM6</div>
    <div class="btn" onclick="showForm('600万',6)">下单</div>
</div>

<div class="card">
    <div>900万</div>
    <div class="price">RM9</div>
    <div class="btn" onclick="showForm('900万',9)">下单</div>
</div>

<div class="title">赌狗单🔥</div>

<div class="card">
    <div>金条2根</div>
    <div class="price">RM11.88</div>
    <div class="btn" onclick="showForm('金条2根',11.88)">下单</div>
</div>

<div class="card">
    <div>金条4根</div>
    <div class="price">RM18.88</div>
    <div class="btn" onclick="showForm('金条4根',18.88)">下单</div>
</div>

<div class="card">
    <div>金条6根</div>
    <div class="price">RM28.88</div>
    <div class="btn" onclick="showForm('金条6根',28.88)">下单</div>
</div>

<div class="title">苏尔南冲突⚔️</div>

<div class="card">
    <div>实验基地1000万</div>
    <div class="price">RM14.88</div>
    <div class="btn" onclick="showForm('实验基地1000万',14.88)">下单</div>
</div>

<!-- 表单 -->
<div id="orderForm">
<div class="form-box">

<h3 id="productName">确认订单</h3>

<input class="input" id="gameId" placeholder="请输入游戏ID">
<input class="input" id="name" placeholder="请输入名字">
<input class="input" id="rank" placeholder="请输入段位">
<input class="input" id="note" placeholder="备注">

<div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;">
数量：
<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>
</div>

<div class="bottom">
<div class="total">总价：RM <span id="total">0</span></div>
<div class="btn" onclick="submitOrder()">确认下单</div>
</div>

</div>
</div>

<!-- 🔥 付款弹窗 -->
<div id="payBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">

<div style="background:#1a0033; padding:20px; border-radius:15px; text-align:center; width:90%;">

<h3>请付款</h3>

<img src="https://i.ibb.co/vxNwFB1p/file-000000003c94720ba60156c57682c8a1.png" 
style="width:220px; margin:15px 0; border-radius:10px;">

<div style="color:#FFD700; font-size:20px;">
金额：RM <span id="payAmount">0</span>
</div>

<div onclick="paidSuccess()" 
style="background:#00ffcc; padding:12px; border-radius:10px; margin-top:15px; cursor:pointer;">
我已付款
</div>

<div onclick="closePay()" 
style="margin-top:10px; color:#aaa; cursor:pointer;">
取消
</div>

</div>
</div>

<script>
let currentPrice = 0;
let currentProduct = "";
let qty = 1;

function showForm(name, price){
    currentProduct = name;
    currentPrice = price;
    qty = 1;

    document.getElementById("orderForm").style.display = "block";
    document.getElementById("productName").innerText = name;
    document.getElementById("qty").innerText = qty;

    updateTotal();
}

function changeQty(n){
    qty += n;
    if(qty < 1) qty = 1;
    document.getElementById("qty").innerText = qty;
    updateTotal();
}

function updateTotal(){
    document.getElementById("total").innerText = currentPrice * qty;
}

function submitOrder(){
    let id = document.getElementById("gameId").value;
    let name = document.getElementById("name").value;

    if(!id || !name){
        alert("请填写完整！");
        return;
    }

    document.getElementById("payBox").style.display = "flex";
    document.getElementById("payAmount").innerText = currentPrice * qty;
}

function paidSuccess(){
    alert("✅ 已付款成功，请等待老板处理");

    document.getElementById("payBox").style.display = "none";
    document.getElementById("orderForm").style.display = "none";
}

function closePay(){
    document.getElementById("payBox").style.display = "none";
}
</script>

</body>
</html>
