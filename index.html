<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞下单</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#000,#0a0a0a);
    color:#fff;
    font-family:Arial;
}

.header img{
    width:100%;
    filter:brightness(0.8);
}

.menu{
    display:flex;
    justify-content:space-around;
    padding:12px;
    font-size:18px;
    background:#0d0d0d;
    border-bottom:1px solid #222;
}

.title{
    color:#FFD700;
    font-size:28px;
    margin:20px;
    font-weight:bold;
}

.card{
    background:linear-gradient(145deg,#111,#1c1c1c);
    margin:15px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.price{
    color:#FFD700;
    font-size:22px;
}

.btn{
    background:linear-gradient(90deg,#FFD700,#ffcc00);
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:12px;
    margin-top:12px;
    cursor:pointer;
    font-weight:bold;
}

.form{
    display:none;
    background:#111;
    margin:15px;
    padding:20px;
    border-radius:18px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#0d0d0d;
    color:#fff;
}

.submit{
    background:#FFD700;
    color:#000;
    padding:14px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

#selectedInfo{
    color:#FFD700;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.ibb.co/vxNwFB1p/file-000000003c94720ba60156c57682c8a1.png">
</div>

<div class="menu">
<div>YS电竞护航🎮</div>
</div>

<div class="title">百万单</div>

<div class="card">
<div>300万</div>
<div class="price">RM3</div>
<div class="btn" onclick="selectOrder('300万','RM3')">下单</div>
</div>

<div class="card">
<div>600万</div>
<div class="price">RM6</div>
<div class="btn" onclick="selectOrder('600万','RM6')">下单</div>
</div>

<div class="card">
<div>900万</div>
<div class="price">RM9</div>
<div class="btn" onclick="selectOrder('900万','RM9')">下单</div>
</div>

<div class="title">千万单</div>

<div class="card">
<div>1000万</div>
<div class="price">RM10</div>
<div class="btn" onclick="selectOrder('1000万','RM10')">下单</div>
</div>

<div class="card">
<div>2000万</div>
<div class="price">RM28</div>
<div class="btn" onclick="selectOrder('2000万','RM28')">下单</div>
</div>

<div class="card">
<div>4000万</div>
<div class="price">RM35</div>
<div class="btn" onclick="selectOrder('4000万','RM35')">下单</div>
</div>

<div class="card">
<div>6000万</div>
<div class="price">RM50</div>
<div class="btn" onclick="selectOrder('6000万','RM50')">下单</div>
</div>

<div class="card">
<div>8000万</div>
<div class="price">RM80</div>
<div class="btn" onclick="selectOrder('8000万','RM80')">下单</div>
</div>

<!-- 表单 -->
<div class="form" id="orderForm">

<h3>填写资料</h3>

<div id="selectedInfo"></div>

<input type="text" id="gameId" placeholder="游戏ID">
<input type="text" id="name" placeholder="你的名字">
<input type="text" id="contact" placeholder="联系方式">

<div class="submit" onclick="submitOrder()">提交订单</div>

</div>

<script>
let selectedProduct = "";
let currentPrice = "";

function selectOrder(order, price){
    selectedProduct = order;
    currentPrice = price;

    document.getElementById("orderForm").style.display = "block";
    document.getElementById("selectedInfo").innerText =
        "已选择：" + order + " / " + price;

    window.scrollTo(0, document.body.scrollHeight);
}

function submitOrder(){
    let id = document.getElementById("gameId").value;
    let name = document.getElementById("name").value;
    let contact = document.getElementById("contact").value;

    if(!id || !name || !contact){
        alert("请填写完整资料！");
        return;
    }

    let msg = `订单:%0A商品:${selectedProduct}%0A价格:${currentPrice}%0AID:${id}%0A名字:${name}%0A联系方式:${contact}`;

    window.open("https://wa.me/601165268227?text=" + msg);
}
</script>

</body>
</html>
