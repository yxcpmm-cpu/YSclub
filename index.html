<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞下单</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#000,#0a0a0a);
  color:#fff;
}

/* 顶部LOGO */
.header{
  text-align:center;
  padding:20px;
}

.header img{
  width:150px;
  filter: drop-shadow(0 0 10px #00ccff);
}

/* 卡片 */
.card{
  background:#111;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px #00ccff33;
}

/* 标题 */
.title{
  font-size:18px;
  margin-bottom:10px;
  color:#00ccff;
}

/* 每一行 */
.item{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

/* 按钮 */
button{
  width:90%;
  margin:20px auto;
  display:block;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00ccff;
  color:#000;
  font-size:16px;
  font-weight:bold;
  box-shadow:0 0 10px #00ccff;
}
</style>

</head>

<body>

<!-- LOGO -->
<div class="header">
  <img src="logo.png">
</div>

<!-- 百万单 -->
<div class="card">
  <div class="title">百万单</div>
  <div class="item"><span>300万</span><span>RM3</span></div>
  <div class="item"><span>600万</span><span>RM6</span></div>
  <div class="item"><span>900万</span><span>RM9</span></div>
</div>

<!-- 千万单 -->
<div class="card">
  <div class="title">千万单</div>
  <div class="item"><span>1000万</span><span>RM9</span></div>
  <div class="item"><span>2000万</span><span>RM18</span></div>
  <div class="item"><span>3000万</span><span>RM27</span></div>
</div>

<!-- 下单按钮 -->
<button onclick="order()">立即下单</button>

<script>
function order(){
  let name = prompt("请输入你的名字：");
  let order = prompt("请输入你要的订单（例如：900万）：");

  if(name && order){
    alert("下单成功🔥\n\n名字："+name+"\n订单："+order);
  }else{
    alert("请填写完整❌");
  }
}
</script>

</body>
</html>
