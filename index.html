<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>YS电竞下单</title>

<style>
body{
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00ccff;
  color:black;
  font-weight:bold;
}

/* 🔥 弹窗 */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

/* ✅ 成功提示 */
#success{
  display:none;
  margin-top:20px;
  color:#00ff99;
  font-size:20px;
}
</style>
</head>

<body>

<h2>YS电竞下单</h2>

<!-- 💰 下单按钮 -->
<button onclick="openPay()">900万 RM9 下单</button>

<!-- 💳 收款码弹窗 -->
<div id="popup">
  <div class="popup-box">
    <h3>请扫码付款</h3>

    <img src="你的二维码链接" width="200"><br><br>

    <button onclick="paid()">我已付款</button>
    <button onclick="closePay()">取消</button>
  </div>
</div>

<!-- 🎉 成功 -->
<div id="success">
  ✅ 付款成功！订单已提交
</div>

<script>
function openPay(){
  document.getElementById("popup").style.display = "flex";
}

function closePay(){
  document.getElementById("popup").style.display = "none";
}

function paid(){
  document.getElementById("popup").style.display = "none";
  document.getElementById("success").style.display = "block";
}
</script>

</body>
</html>
