<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电竞下单</title>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#000,#0a0a0a);
    color:#fff;
    font-family:Arial;
}

.header img{
    width:100%;
    filter:brightness(0.8);
}

.menu{
    display:flex;
    justify-content:space-around;
    padding:12px;
    font-size:18px;
    background:#0d0d0d;
    border-bottom:1px solid #222;
}

.title{
    color:#FFD700;
    font-size:28px;
    margin:20px;
    font-weight:bold;
}

.card{
    background:linear-gradient(145deg,#111,#1c1c1c);
    margin:15px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.price{
    color:#FFD700;
    font-size:22px;
}

.btn{
    background:linear-gradient(90deg,#FFD700,#ffcc00);
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:12px;
    margin-top:12px;
    cursor:pointer;
    font-weight:bold;
}

.form{
    display:none;
    background:#111;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#0d0d0d;
    color:#fff;
}

.submit{
    background:#FFD700;
    color:#000;
    padding:12px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.ibb.co/vxNwFB1p/file-000000003c94720ba60156c57682c8a1.png">
</div>

<script>
function toggleForm(id){
    let f = document.getElementById(id);
    f.style.display = f.style.display === "block" ? "none" : "block";
}

function submitOrder(product, price, btn){
    let form = btn.parentElement;
    let inputs = form.getElementsByTagName("input");

    let id = inputs[0].value;
    let name = inputs[1].value;
    let contact = inputs[2].value;

    if(!id || !name || !contact){
        alert("请填写完整资料！");
        return;
    }

    let msg = `订单:%0A商品:${product}%0A价格:${price}%0AID:${id}%0A名字:${name}%0A联系方式:${contact}`;

    window.open("https://wa.me/601165268227?text=" + msg);
}
</script>
