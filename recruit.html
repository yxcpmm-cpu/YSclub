<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招募打手 - YS电竞</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#6b4bbd;
    color:#fff;
}

/* 顶部 */
.header{
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:bold;
}

/* 卡片 */
.card{
    background:#fff;
    color:#000;
    margin:15px;
    padding:15px;
    border-radius:15px;
}

/* 标题 */
.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

/* 输入框 */
input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#eee;
}

/* 按钮 */
.btn{
    background:#7b5cff;
    color:#fff;
    text-align:center;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

/* 说明 */
.info{
    font-size:14px;
    line-height:1.6;
}
</style>

</head>

<body>

<div class="header">🔥 招募电竞打手</div>

<!-- 说明 -->
<div class="card">
    <div class="title">📢 招募要求</div>
    <div class="info">
        ✔ 熟悉游戏操作<br>
        ✔ 有时间接单<br>
        ✔ 服从安排<br>
        ✔ 态度良好不摆烂<br><br>
        💰 收入：按单结算，多劳多得
    </div>
</div>

<!-- 表单 -->
<div class="card">
    <div class="title">📋 报名信息</div>

    <input id="name" placeholder="你的名字">
    <input id="gameid" placeholder="游戏ID">
    <input id="rank" placeholder="段位 / 实力">
    
    <select id="time">
        <option>在线时间（选择）</option>
        <option>全天在线</option>
        <option>晚上</option>
        <option>周末</option>
    </select>

    <div class="btn" onclick="apply()">提交报名</div>
</div>

<script>
function apply(){
    let name = document.getElementById("name").value;
    let id = document.getElementById("gameid").value;
    let rank = document.getElementById("rank").value;
    let time = document.getElementById("time").value;

    if(!name || !id){
        alert("请填写完整信息");
        return;
    }

    // 👉 WhatsApp跳转（改成你的号码）
    let phone = "60123456789";

    let text = 
    "【打手报名】%0A" +
    "名字：" + name + "%0A" +
    "游戏ID：" + id + "%0A" +
    "段位：" + rank + "%0A" +
    "时间：" + time;

    window.location.href = "https://wa.me/" + phone + "?text=" + text;
}
</script>

</body>
</html>
