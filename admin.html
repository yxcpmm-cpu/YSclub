<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>YS后台</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family:sans-serif;
}

/* 登录界面 */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,215,0,0.3);
    text-align:center;
}
input{
    width:200px;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#FFD700;
    color:#000;
}

/* 后台界面 */
.admin{
    display:none;
    padding:20px;
}

h2{
    color:#FFD700;
}

/* 卡片 */
.panel{
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.item{
    margin:5px 0;
}
</style>
</head>

<body>

<!-- 登录 -->
<div class="login" id="login">
    <div class="box">
        <h2>后台登录</h2>
        <input type="password" id="pass" placeholder="输入密码">
        <br>
        <button onclick="login()">进入后台</button>
    </div>
</div>

<!-- 后台 -->
<div class="admin" id="admin">

<h2>YS后台管理</h2>

<div class="panel">
<select id="group">
<option>百万单</option>
<option>千万单</option>
</select>

<input id="name" placeholder="商品名称">
<input id="price" placeholder="价格">

<button onclick="add()">添加</button>
<button onclick="save()">保存</button>
</div>

<div class="panel">
<h3>商品列表</h3>
<div id="list"></div>
</div>

</div>

<script>

// 🔐 这里改你的密码
let PASSWORD = "123456";

function login(){
    let p=document.getElementById("pass").value;
    if(p===PASSWORD){
        document.getElementById("login").style.display="none";
        document.getElementById("admin").style.display="block";
    }else{
        alert("密码错误！");
    }
}

// 数据
let data = JSON.parse(localStorage.getItem("shopData")) || {
    "百万单":[],
    "千万单":[]
};

function render(){
    let html="";
    for(let g in data){
        html+=`<h3>${g}</h3>`;
        data[g].forEach((item,i)=>{
            html+=`
            <div class="item">
            ${item.name} - ${item.price}
            <button onclick="del('${g}',${i})">删除</button>
            </div>`;
        });
    }
    document.getElementById("list").innerHTML=html;
}

function add(){
    let g=document.getElementById("group").value;
    let name=document.getElementById("name").value;
    let price=document.getElementById("price").value;

    if(!name || !price){
        alert("填写完整！");
        return;
    }

    data[g].push({name,price});
    render();
}

function del(g,i){
    data[g].splice(i,1);
    render();
}

function save(){
    localStorage.setItem("shopData",JSON.stringify(data));
    alert("保存成功！");
}

render();
</script>

</body>
</html>
