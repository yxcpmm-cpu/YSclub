<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞点单系统</title>

<style>
body{
    margin:0;
    font-family:"微软雅黑";
    background:#0b0b0b;
    color:#fff;
}

/* 顶部封面 */
.header{
    height:240px;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

.header h1{
    color:#FFD700;
    font-size:30px;
    margin:0;
}
.header p{
    color:#ccc;
    font-size:14px;
}

/* 分类按钮 */
.tabs{
    display:flex;
    justify-content:center;
    margin-top:-25px;
}
.tabs button{
    margin:5px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    background:#1a1a1a;
    color:#aaa;
}
.tabs .active{
    background:#FFD700;
    color:#000;
}

/* 区块标题 */
.section-title{
    padding:15px;
    font-size:18px;
    color:#FFD700;
}

/* 商品列表 */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:10px;
}

/* 卡片 */
.card{
    background:linear-gradient(145deg,#1a1a1a,#111);
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(255,215,0,0.2);
    transition:0.2s;
}
.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.title{
    font-size:14px;
}

.price{
    color:#FFD700;
    font-size:18px;
    margin-top:5px;
}

.buy{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#FFD700,#ffb700);
    color:#000;
    font-weight:bold;
}

/* 弹窗 */
.modal{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:#1a1a1a;
    padding:20px;
    border-radius:20px 20px 0 0;
    transition:0.3s;
}
.modal.active{
    bottom:0;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
    <h1>YS电竞点单</h1>
    <p>安全稳定 · 极速发货</p>
</div>

<div class="tabs">
    <button class="active">百万单</button>
    <button>千万单</button>
</div>

<div class="section-title">🔥 热门套餐</div>

<div class="container">

    <!-- 百万单 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
        <div class="info">
            <div class="title">300万金币</div>
            <div class="price">RM3</div>
            <button class="buy" onclick="order('300万 RM3')">立即下单</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
        <div class="info">
            <div class="title">600万金币</div>
            <div class="price">RM6</div>
            <button class="buy" onclick="order('600万 RM6')">立即下单</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
        <div class="info">
            <div class="title">900万金币</div>
            <div class="price">RM9</div>
            <button class="buy" onclick="order('900万 RM9')">立即下单</button>
        </div>
    </div>

    <!-- 千万单 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <div class="info">
            <div class="title">1000万金币</div>
            <div class="price">RM10</div>
            <button class="buy" onclick="order('1000万 RM10')">立即下单</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
        <div class="info">
            <div class="title">2000万金币</div>
            <div class="price">RM28</div>
            <button class="buy" onclick="order('2000万 RM28')">立即下单</button>
        </div>
    </div>

</div>

<!-- 下单弹窗 -->
<div id="modal" class="modal">
    <h3>确认订单</h3>
    <p id="orderText"></p>

    <input id="uid" placeholder="输入游戏ID">

    <button class="buy" onclick="submitOrder()">提交订单</button>
</div>

<script>
function order(text){
    document.getElementById("modal").classList.add("active");
    document.getElementById("orderText").innerText = text;
}

function submitOrder(){
    let uid = document.getElementById("uid").value;
    alert("下单成功！请联系客服付款\nID："+uid);
}
</script>

</body>
</html>
