<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞</title>

<style>
body{
    margin:0;
    font-family:"微软雅黑";
    background:#0a0a0a;
    color:#fff;
}

/* 轮播 */
.banner{
    width:100%;
    height:180px;
    overflow:hidden;
    position:relative;
}
.banner img{
    width:100%;
    height:180px;
    object-fit:cover;
    position:absolute;
    transition:0.5s;
}

/* 分类 */
.menu{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    text-align:center;
    margin:10px;
}
.menu div{
    padding:10px;
}
.menu span{
    display:block;
    margin-top:5px;
    font-size:12px;
}

/* 分组 */
.group{
    padding:15px;
}
.group h2{
    color:#FFD700;
}

/* 卡片 */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}
.card{
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
    box-shadow:0 0 10px rgba(255,215,0,0.2);
}
.price{
    color:#FFD700;
}
button{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    border-radius:8px;
    background:#FFD700;
    color:#000;
}

/* 客服悬浮 */
.service{
    position:fixed;
    right:15px;
    bottom:80px;
    background:#25D366;
    padding:12px;
    border-radius:50%;
    font-size:18px;
}

/* 底部导航 */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}
.nav div{
    text-align:center;
    font-size:12px;
}
</style>
</head>

<body>

<!-- 轮播 -->
<div class="banner">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" style="left:0%">
    <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee" style="left:100%">
</div>

<!-- 分类 -->
<div class="menu">
    <div>🎮<span>护航区</span></div>
    <div>⚔️<span>装备区</span></div>
    <div>💎<span>百万单</span></div>
    <div>🔥<span>千万单</span></div>
</div>

<!-- 百万单 -->
<div class="group">
<h2>🔥 百万单</h2>
<div class="container">

<div class="card">
300万
<div class="price">RM3</div>
<button onclick="buy('300万 RM3')">下单</button>
</div>

<div class="card">
600万
<div class="price">RM6</div>
<button onclick="buy('600万 RM6')">下单</button>
</div>

<div class="card">
900万
<div class="price">RM9</div>
<button onclick="buy('900万 RM9')">下单</button>
</div>

</div>
</div>

<!-- 千万单 -->
<div class="group">
<h2>💎 千万单</h2>
<div class="container">

<div class="card">
1000万
<div class="price">RM10</div>
<button onclick="buy('1000万 RM10')">下单</button>
</div>

<div class="card">
2000万
<div class="price">RM28</div>
<button onclick="buy('2000万 RM28')">下单</button>
</div>

</div>
</div>

<!-- 客服 -->
<a class="service" href="https://wa.me/60105997283">💬</a>

<!-- 底部 -->
<div class="nav">
<div>🏠<br>首页</div>
<div>📦<br>订单</div>
<div>👤<br>我的</div>
</div>

<script>
// 轮播
let index=0;
setInterval(()=>{
    let imgs=document.querySelectorAll(".banner img");
    index=(index+1)%imgs.length;
    imgs.forEach((img,i)=>{
        img.style.left=(i-index)*100+"%";
    });
},3000);

// 下单
function buy(text){
    let uid=prompt("输入游戏ID:");
    if(uid){
        window.location.href=
        "https://wa.me/60105997283?text=我要下单："+text+" ID:"+uid;
    }
}
</script>

</body>
</html>
