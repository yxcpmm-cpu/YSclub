<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞点单</title>

<style>
body{
    margin:0;
    font-family:"微软雅黑";
    background:#0b0b0b;
    color:#fff;
}

/* 顶部 */
.header{
    height:200px;
    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.header h1{
    color:#FFD700;
    margin:0;
}
.header p{
    color:#ccc;
}

/* 客服按钮 */
.service{
    margin-top:10px;
    padding:8px 18px;
    background:#25D366;
    border-radius:20px;
    color:#fff;
    text-decoration:none;
    font-size:14px;
}

/* 分组标题 */
.group{
    padding:15px;
}

.group h2{
    color:#FFD700;
    margin-bottom:10px;
}

/* 卡片 */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(255,215,0,0.2);
}

.card img{
    width:100%;
    height:110px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:#FFD700;
}

.buy{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:none;
    background:#FFD700;
    color:#000;
    border-radius:8px;
}

/* 弹窗 */
.modal{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:#1a1a1a;
    padding:20px;
    border-radius:20px 20px 0 0;
    transition:0.3s;
}
.modal.active{
    bottom:0;
}
input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
    <h1>YS电竞点单</h1>
    <p>安全稳定 · 快速发货</p>

    <!-- 客服 -->
    <a class="service" href="https://wa.me/60105997283">联系客服</a>
</div>

<!-- 百万单 -->
<div class="group">
    <h2>🔥 百万单</h2>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
            <div class="info">
                <div>300万</div>
                <div class="price">RM3</div>
                <button class="buy" onclick="order('300万 RM3')">下单</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
            <div class="info">
                <div>600万</div>
                <div class="price">RM6</div>
                <button class="buy" onclick="order('600万 RM6')">下单</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1606112219348-204d7d8b94ee">
            <div class="info">
                <div>900万</div>
                <div class="price">RM9</div>
                <button class="buy" onclick="order('900万 RM9')">下单</button>
            </div>
        </div>

    </div>
</div>

<!-- 千万单 -->
<div class="group">
    <h2>💎 千万单</h2>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
            <div class="info">
                <div>1000万</div>
                <div class="price">RM10</div>
                <button class="buy" onclick="order('1000万 RM10')">下单</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
            <div class="info">
                <div>2000万</div>
                <div class="price">RM28</div>
                <button class="buy" onclick="order('2000万 RM28')">下单</button>
            </div>
        </div>

    </div>
</div>

<!-- 弹窗 -->
<div id="modal" class="modal">
    <h3>确认订单</h3>
    <p id="orderText"></p>

    <input id="uid" placeholder="输入游戏ID">

    <button class="buy" onclick="submitOrder()">提交订单</button>
</div>

<script>
function order(text){
    document.getElementById("modal").classList.add("active");
    document.getElementById("orderText").innerText = text;
}

function submitOrder(){
    let uid = document.getElementById("uid").value;
    window.location.href = "https://wa.me/60105997283?text=我要下单："+document.getElementById("orderText").innerText+" ID:"+uid;
}
</script>

</body>
</html>
