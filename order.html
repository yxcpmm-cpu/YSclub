<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>下单</title>

<style>
body{
    background:#0c0c0c;
    color:white;
    text-align:center;
}
input,button{
    padding:10px;
    margin:10px;
    width:200px;
}
button{
    background:gold;
    border:none;
}
</style>

</head>

<body>

<h2>提交订单</h2>

<input id="item" placeholder="商品"><br>
<input placeholder="游戏ID"><br>
<input placeholder="数量"><br>

<button onclick="submitOrder()">提交</button>

<script>
const url = new URLSearchParams(window.location.search);
document.getElementById("item").value = url.get("item") || "";

function submitOrder(){
    alert("下单成功！");
}
</script>

</body>
</html>
