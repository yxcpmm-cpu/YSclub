<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YS电竞点单</title>

<style>
body{
    margin:0;
    font-family:"微软雅黑";
    background:#0f0f0f;
    color:#fff;
}

/* 顶部封面 */
.header{
    height:220px;
    background:url('https://images.unsplash.com/photo-1606112219348-204d7d8b94ee') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    color:#FFD700;
    text-shadow:0 0 10px #000;
}

/* 分类 */
.tabs{
    display:flex;
    justify-content:center;
    margin:15px;
}
.tabs button{
    margin:5px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#1f1f1f;
    color:#fff;
}
.tabs button.active{
    background:#FFD700;
    color:#000;
}

/* 商品卡片 */
.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:10px;
}

.card{
    background:#1a1a1a;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(255,215,0,0.3);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card .info{
    padding:10px;
}

.price{
    color:#FFD700;
    font-size:18px;
    margin-top:5px;
}

button.buy{
    width:100%;
    padding:8px;
    border:none;
    background:#FFD700;
    color:#000;
    border-radius:8px;
    margin-top:8px;
}

/* 弹窗 */
.modal{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100%;
    background:#222;
    padding:20px;
    border-radius:20px 20px 0 0;
    transition:0.3s;
}
.modal.active{
    bottom:0;
}
</style>

</head>

<body>

<div class="header">YS电竞点单系统</div>

<div class="tabs">
    <button class="active">A套餐</button>
    <button>B套餐</button>
</div>

<div class="container">

    <!-- A套餐 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1580128637393-1c76e96c2e77">
        <div class="info">
            <div>300万金币</div>
            <div class="price">RM3</div>
            <button class="buy" onclick="order('300万 RM3')">立即下单</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1580128637393-1c76e96c2e77">
        <div class="info">
            <div>600万金币</div>
            <div class="price">RM6</div>
            <button class="buy" onclick="order('600万 RM6')">立即下单</button>
        </div>
    </div>

    <!-- B套餐 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f">
        <div class="info">
            <div>1000万金币</div>
            <div class="price">RM10</div>
            <button class="buy" onclick="order('1000万 RM10')">立即下单</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1605902711622-cfb43c44367f">
        <div class="info">
            <div>2000万金币</div>
            <div class="price">RM28</div>
            <button class="buy" onclick="order('2000万 RM28')">立即下单</button>
        </div>
    </div>

</div>

<!-- 下单弹窗 -->
<div id="modal" class="modal">
    <h3>确认下单</h3>
    <p id="orderText"></p>
    <input placeholder="填写游戏ID" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;">
    <button onclick="submitOrder()" style="margin-top:10px;width:100%;padding:10px;background:#FFD700;border:none;border-radius:8px;">提交订单</button>
</div>

<script>
function order(text){
    document.getElementById("modal").classList.add("active");
    document.getElementById("orderText").innerText = text;
}

function submitOrder(){
    alert("下单成功！联系客服付款");
}
</script>

</body>
</html>
